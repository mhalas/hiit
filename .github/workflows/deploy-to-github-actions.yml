name: Deploy to GitHub Pages
on: [push]
jobs:
  deploy:
    permissions: 
      contents: read
      pages: write
    runs-on: ubuntu-latest
    name: Deploy
    steps:
    - uses: actions/checkout@v2
    - id: Build-Vue
      uses: xRealNeon/VuePagesAction@1.0.1
      with:
        username: 'mhalas'
        reponame: 'hiit'
        token: ${{ secrets.GITHUB_TOKEN }}